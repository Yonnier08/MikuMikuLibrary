Name: Build MikuMikuModel (Winlator-optimized)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Create MotCombiner project
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "MotCombiner" -Force

          @'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <OutputType>Exe</OutputType>
              <TargetFramework>net8.0-windows</TargetFramework>
              <UseWindowsForms>true</UseWindowsForms>
            </PropertyGroup>
            <ItemGroup>
              <ProjectReference Include="..\MikuMikuLibrary\MikuMikuLibrary.csproj" />
              <ProjectReference Include="..\MikuMikuModel\MikuMikuModel.csproj" />
            </ItemGroup>
          </Project>
          '@ | Set-Content "MotCombiner/MotCombiner.csproj"

          @'
          using System;
          using System.IO;
          using System.Linq;
          using MikuMikuLibrary.Motions;
          using MikuMikuModel.Configurations;

          if (args.Length < 2)
          {
              Console.WriteLine("Uso: MotCombiner.exe <ruta_al_root.mot> <nombre_configuracion>");
              Console.WriteLine();
              Console.WriteLine("Configuraciones disponibles:");
              foreach (var c in ConfigurationList.Instance.Configurations)
                  Console.WriteLine($"  - {c.Name}");
              return;
          }

          string rootPath = Path.GetFullPath(args[0]);
          string configName = args[1];
          string directory = Path.GetDirectoryName(rootPath)!;
          string baseName = Path.GetFileNameWithoutExtension(rootPath);

          var configuration = ConfigurationList.Instance.Configurations
              .FirstOrDefault(c => c.Name.Equals(configName, StringComparison.OrdinalIgnoreCase))
              ?? throw new Exception($"No se encontro la configuracion '{configName}'.");

          Console.WriteLine($"Usando configuracion: {configuration.Name}");

          var boneData = configuration.BoneData
              ?? throw new Exception("La configuracion no tiene BoneData cargado.");
          var skeleton = boneData.Skeletons.FirstOrDefault()
              ?? throw new Exception("No hay ningun Skeleton en el BoneData.");
          var motionDatabase = configuration.MotionDatabase;

          // 1. Cargar la animacion principal (root)
          var mainMotion = new Motion();
          mainMotion.Load(rootPath, skeleton);

          int found = 0;
          foreach (var divFile in Directory.GetFiles(directory, $"{baseName}_div_*.mot").OrderBy(f => f))
          {
              Console.WriteLine($"Combinando: {Path.GetFileName(divFile)}");
              var divMotion = new Motion();
              divMotion.Load(divFile, skeleton);

              // 2. Fusionar de forma segura los canales de huesos de la motion divisional a la principal
              foreach (var divBoneBinding in divMotion.KeySet.BoneBindings)
              {
                  var existingBoneBinding = mainMotion.KeySet.BoneBindings
                      .FirstOrDefault(b => b.Name.Equals(divBoneBinding.Name, StringComparison.OrdinalIgnoreCase));

                  if (existingBoneBinding == null)
                  {
                      // Si el hueso no existe en la animacion principal, lo agregamos completo
                      mainMotion.KeySet.BoneBindings.Add(divBoneBinding);
                  }
                  else
                  {
                      // Si ya existe, combinamos con cuidado los keys de traslacion/rotacion que falten
                      if (existingBoneBinding.Position == null && divBoneBinding.Position != null)
                          existingBoneBinding.Position = divBoneBinding.Position;
                      
                      if (existingBoneBinding.Rotation == null && divBoneBinding.Rotation != null)
                          existingBoneBinding.Rotation = divBoneBinding.Rotation;
                  }
              }

              // Fusionar canales de morphs/expresiones faciales
              foreach (var divMorphBinding in divMotion.KeySet.MorphBindings)
              {
                  var existingMorphBinding = mainMotion.KeySet.MorphBindings
                      .FirstOrDefault(m => m.Name.Equals(divMorphBinding.Name, StringComparison.OrdinalIgnoreCase));

                  if (existingMorphBinding == null)
                  {
                      mainMotion.KeySet.MorphBindings.Add(divMorphBinding);
                  }
              }

              // Fusionar transformaciones de camara si existieran en los divs
              if (mainMotion.KeySet.Camera == null && divMotion.KeySet.Camera != null)
                  mainMotion.KeySet.Camera = divMotion.KeySet.Camera;

              found++;
          }

          if (found == 0)
          {
              Console.WriteLine("No se encontraron archivos _div_ junto al root. Nada que combinar.");
              return;
          }

          // 3. Ajustar los metadatos globales del archivo final
          // Recalculamos la duracion total para que no se corte la animacion antes de tiempo
          float maxFrame = mainMotion.FrameCount;
          foreach (var b in mainMotion.KeySet.BoneBindings)
          {
              if (b.Position != null && b.Position.KeyFrames.Count > 0)
                  maxFrame = Math.Max(maxFrame, b.Position.KeyFrames.Max(k => k.Frame));
              if (b.Rotation != null && b.Rotation.KeyFrames.Count > 0)
                  maxFrame = Math.Max(maxFrame, b.Rotation.KeyFrames.Max(k => k.Frame));
          }
          mainMotion.FrameCount = maxFrame;

          string outputPath = Path.Combine(directory, $"{baseName}_combined.mot");
          mainMotion.Save(outputPath, skeleton);
          Console.WriteLine($"Listo: {outputPath}");
          '@ | Set-Content "MotCombiner/Program.cs"

          $config = @'
          {
            "configProperties": {
              "System.Runtime.Intrinsics.X86.Aes.IsSupported": false,
              "System.Runtime.Intrinsics.X86.Avx.IsSupported": false,
              "System.Runtime.Intrinsics.X86.Avx2.IsSupported": false,
              "System.Runtime.Intrinsics.X86.Sse42.IsSupported": false,
              "System.Runtime.Intrinsics.X86.Pclmulqdq.IsSupported": false,
              "System.GC.Server": false,
              "System.GC.Concurrent": false,
              "System.GC.HeapHardLimit": 536870912
            }
          }
          '@
          Set-Content -Path "MotCombiner/runtimeconfig.template.json" -Value $config

      - name: Build MotCombiner (test compile)
        run: |
          dotnet restore MotCombiner/MotCombiner.csproj
          dotnet build MotCombiner/MotCombiner.csproj -c Release

      - name: Publish MotCombiner
        run: dotnet publish MotCombiner/MotCombiner.csproj -c Release -r win-x64 --self-contained true -o publish/MotCombiner-x64

      - name: Upload MotCombiner artifact
        uses: actions/upload-artifact@v4
        with:
          name: MotCombiner-x64
          path: publish/MotCombiner-x64/

      - name: Install FBX SDK
        run: |
          Invoke-WebRequest "https://www.autodesk.com/content/dam/autodesk/www/adn/fbx/2020-3-2/fbx202032_fbxsdk_vs2019_win.exe" -OutFile "FBX.exe"
          Start-Process -Wait -FilePath "FBX.exe" -ArgumentList "/S /D=$env:GITHUB_WORKSPACE\MikuMikuLibrary.Native\Dependencies\FBX"
        shell: pwsh

      - name: Setup MSVC environment
        uses: microsoft/setup-msbuild@v2

      - name: Inject Winlator-safe runtimeconfig
        shell: pwsh
        run: |
          $config = @'
          {
            "configProperties": {
              "System.Runtime.Intrinsics.X86.Aes.IsSupported": false,
              "System.Runtime.Intrinsics.X86.Avx.IsSupported": false,
              "System.Runtime.Intrinsics.X86.Avx2.IsSupported": false,
              "System.Runtime.Intrinsics.X86.Sse42.IsSupported": false,
              "System.Runtime.Intrinsics.X86.Pclmulqdq.IsSupported": false,
              "System.GC.Server": false,
              "System.GC.Concurrent": false,
              "System.GC.HeapHardLimit": 536870912
            }
          }
          '@
          Set-Content -Path "MikuMikuModel/runtimeconfig.template.json" -Value $config

      - name: Build Miku Miku Library
        run: |
          nuget restore MikuMikuLibrary.sln
          ./publish.bat

      - name: Upload x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: MikuMikuModel-winlator-x64
          path: publish/MikuMikuLibrary-x64.7z
          compression-level: 0

      - name: Upload x86 artifact
        uses: actions/upload-artifact@v4
        with:
          name: MikuMikuModel-winlator-x86
          path: publish/MikuMikuLibrary-x86.7z
          compression-level: 0
